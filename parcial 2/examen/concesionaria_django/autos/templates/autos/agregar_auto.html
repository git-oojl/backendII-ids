{% extends "autos/base.html" %}

{% block titulo %}Agregar auto{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header">
                <h1 class="h4 mb-0">Agregar nuevo auto</h1>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for campo in formulario %}
                        <div class="mb-3">
                            <label class="form-label">{{ campo.label }}</label>
                            {{ campo }}
                            {% if campo.errors %}
                                <div class="text-danger small mt-1">
                                    {{ campo.errors }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{% url 'lista_autos' %}" class="btn btn-secondary">Ver lista</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
